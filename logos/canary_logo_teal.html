<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Canary AI Institute — Teal Versions</title>
<style>
  body {
    margin: 0;
    padding: 40px;
    background: #e0e0e0;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  h2 {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #666;
    margin: 32px 0 12px 0;
    font-weight: 400;
  }
  .row {
    display: flex;
    gap: 24px;
    margin-bottom: 8px;
  }
  .card-light {
    flex: 1;
    border-radius: 6px;
    overflow: hidden;
    background: #FFFFFF;
    border: 1px solid #ddd;
  }
  .card-dark {
    flex: 1;
    border-radius: 6px;
    overflow: hidden;
  }
  .label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #999;
    margin-top: 8px;
    text-align: center;
  }
</style>
</head>
<body>

<h2>Dark Teal — Light &amp; Dark Versions</h2>
<div class="row">

  <!-- LIGHT -->
  <div>
    <div class="card-light">
      <svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 900 340">
        <defs><style>
          .wm-l { font-family: "Trajan Pro","Cinzel","Times New Roman",serif; font-weight:400; fill:#1A2A28; font-size:88px; }
          .cl-l { font-family: "Trajan Pro","Cinzel","Times New Roman",serif; font-weight:400; fill:#FFFFFF; font-size:88px; }
          .tl-l { font-family: "Helvetica Neue","Helvetica","Arial",sans-serif; fill:#7A9A96; font-size:22px; letter-spacing:7px; font-weight:300; }
        </style></defs>
        <rect x="152" y="62" width="100" height="194" rx="14" fill="#1A4A44"/>
        <text x="202" y="152" text-anchor="middle" class="cl-l">A</text>
        <text x="202" y="242" text-anchor="middle" class="cl-l">I</text>
        <text x="110" y="152" text-anchor="middle" class="wm-l">C</text>
        <text x="262" y="152" class="wm-l" letter-spacing="3">NARY</text>
        <text x="262" y="242" class="wm-l" letter-spacing="3">NSTITUTE</text>
        <line x1="108" y1="272" x2="720" y2="272" stroke="#1A4A44" stroke-width="0.8"/>
        <text x="414" y="312" text-anchor="middle" class="tl-l">FOR AI POLICY</text>
      </svg>
    </div>
    <div class="label">Light</div>
  </div>

  <!-- DARK -->
  <div>
    <div class="card-dark">
      <svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 900 340">
        <defs><style>
          .wm-d { font-family: "Trajan Pro","Cinzel","Times New Roman",serif; font-weight:400; fill:#C8DFDC; font-size:88px; }
          .cl-d { font-family: "Trajan Pro","Cinzel","Times New Roman",serif; font-weight:400; fill:#FFFFFF; font-size:88px; }
          .tl-d { font-family: "Helvetica Neue","Helvetica","Arial",sans-serif; fill:#5A8A84; font-size:22px; letter-spacing:7px; font-weight:300; }
        </style></defs>
        <rect width="900" height="340" fill="#0D2B27"/>
        <rect x="152" y="62" width="100" height="194" rx="14" fill="#1F4A44" stroke="#2A6058" stroke-width="1"/>
        <text x="202" y="152" text-anchor="middle" class="cl-d">A</text>
        <text x="202" y="242" text-anchor="middle" class="cl-d">I</text>
        <text x="110" y="152" text-anchor="middle" class="wm-d">C</text>
        <text x="262" y="152" class="wm-d" letter-spacing="3">NARY</text>
        <text x="262" y="242" class="wm-d" letter-spacing="3">NSTITUTE</text>
        <line x1="108" y1="272" x2="720" y2="272" stroke="#2A6058" stroke-width="0.8"/>
        <text x="414" y="312" text-anchor="middle" class="tl-d">FOR AI POLICY</text>
      </svg>
    </div>
    <div class="label">Dark</div>
  </div>

</div>
</body>
</html>
